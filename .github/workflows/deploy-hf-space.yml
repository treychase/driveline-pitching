name: Deploy to Hugging Face Space

# Mirrors `main` to the HuggingFace Space on every push, so the live app at
# https://huggingface.co/spaces/treychase/driveline-pitching always matches the
# repo. Requires a repository secret named `HF_TOKEN` (a HuggingFace token with
# *write* access): Settings -> Secrets and variables -> Actions.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1   # only the current tree; old history isn't pushed

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::HF_TOKEN secret is not set. Add a write token at" \
                 "Settings -> Secrets and variables -> Actions (name it HF_TOKEN)."
            exit 1
          fi
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git lfs install --local
          # Mirror the current tree as a single flattened (orphan) commit:
          #  - flattened, because the repo history holds an old >10 MB asset
          #    that HF's 10 MiB non-LFS limit rejects (the Space needs no
          #    history);
          #  - binaries tracked via Git LFS, because this Space uses Xet/LFS
          #    storage and rejects raw binary files (even small ones).
          git checkout --orphan hf-deploy
          git lfs track "*.gif" "*.png" "*.jpg" "*.jpeg" "*.mp4" "*.c3d" >/dev/null
          git add .gitattributes
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA} to Hugging Face Space"
          git push --force \
            "https://treychase:${HF_TOKEN}@huggingface.co/spaces/treychase/driveline-pitching" \
            hf-deploy:main
