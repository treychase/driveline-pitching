[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
# Pyflakes (F) + a pragmatic subset of pycodestyle. E401 (multiple imports on one
# line) and E402 (module import not at top) are allowed for the grouped imports
# and lazy imports used here.
select = ["E4", "E7", "E9", "F", "W"]
# E401/E402: grouped & lazy imports; E702: compact appends; E741: short axis names.
ignore = ["E401", "E402", "E702", "E741"]
